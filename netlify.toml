# Edithive Smart Selects — static landing site.
# No build step: Netlify publishes the pre-built folder as-is.
# _headers and _redirects inside the publish dir are applied automatically.
[build]
  publish = "myedithive-site"
  command = ""

# Email system: submission-created (auto-responder) + send-beta-invites.
# Lives in /functions (NOT netlify/functions, which holds legacy unused code).
[functions]
  directory = "functions"
  node_bundler = "esbuild"
